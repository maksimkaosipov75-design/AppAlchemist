name: Bug report
description: Report a problem with AppAlchemist itself
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AppAlchemist version
      placeholder: "1.5.0"
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Linux distribution
      placeholder: "CachyOS, Arch, Ubuntu 24.04, Fedora 40"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open AppAlchemist..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
